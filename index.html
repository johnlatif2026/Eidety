<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eidety | عيديتي</title>
    <link rel="icon" href="https://i.postimg.cc/Nj83FS93/Eidety.jpg" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(28, 58, 173, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(220, 38, 38, 0.1) 0%, transparent 20%);
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 30px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 24px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
            position: relative;
            padding-bottom: 15px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 3px;
            background: linear-gradient(to right, transparent, #fbbf24, transparent);
            border-radius: 3px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #60a5fa;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        input {
            width: 100%;
            max-width: 400px;
            padding: 16px 20px;
            font-size: 1.1rem;
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid rgba(96, 165, 250, 0.3);
            border-radius: 12px;
            color: #f1f5f9;
            text-align: center;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        input::placeholder {
            color: #94a3b8;
        }

        .btn {
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #1e293b;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        .btn:active {
            transform: translateY(0);
        }

        .boxes-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
        }

        .gift-box {
            width: 130px;
            height: 130px;
            background: linear-gradient(145deg, #1e293b, #334155);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 3.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .gift-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gift-box:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.5),
                0 0 0 3px rgba(245, 158, 11, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .gift-box:hover::before {
            opacity: 1;
        }

        .gift-box.selected {
            transform: scale(1.05);
            background: linear-gradient(145deg, #1e40af, #1e3a8a);
            box-shadow: 
                0 0 25px rgba(37, 99, 235, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .gift-box.selected::before {
            opacity: 1;
            background: linear-gradient(90deg, #60a5fa, #93c5fd, #60a5fa);
        }

        .gift-box.disabled {
            cursor: not-allowed;
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        .gift-box.disabled:hover {
            transform: none;
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .message-container {
            margin-top: 40px;
            padding: 25px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 18px;
            border: 2px solid rgba(96, 165, 250, 0.2);
            display: none;
        }

        .message-container.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .message-content {
            font-size: 2rem;
            font-weight: bold;
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
            padding: 15px;
            border-radius: 12px;
            background: rgba(21, 128, 61, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .user-welcome {
            font-size: 1.3rem;
            color: #cbd5e1;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.7);
            display: inline-block;
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: bold;
            display: none;
        }

        .alert.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .alert.error {
            background: rgba(220, 38, 38, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        .alert.info {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .snowflake {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.8;
            z-index: -1;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .gift-box {
                width: 100px;
                height: 100px;
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="username-container">
        <h1>Eidety | عيديتي</h1>
        <h2>اختر هديتك</h2>
        <div class="container">

<img class="logo" src="https://i.postimg.cc/Nj83FS93/Eidety.jpg">

<h2>خريستوس انيستي</h2>
<h3>Χριστός ἀνέστη</h3>
        <div class="input-group">
            <input type="text" id="username" placeholder="اكتب اسمك هنا" />
            <button class="btn" onclick="start()">دخول إلى المفاجأة</button>
        </div>
        
        <div class="alert error" id="error-alert">من فضلك اكتب اسمك أولاً</div>
    </div>

    <div class="container" id="gift-container" style="display: none;">
        <h1>اختر عديتك</h1>
        
        <div class="user-welcome" id="user-welcome">مرحباً، <span id="welcome-name"></span></div>
        
        <div class="boxes-container">
            <div class="gift-box" onclick="selectGift(1)">🎁</div>
            <div class="gift-box" onclick="selectGift(2)">🎁</div>
            <div class="gift-box" onclick="selectGift(3)">🎁</div>
            <div class="gift-box" onclick="selectGift(4)">🎁</div>
        </div>
        
        <div class="message-container" id="message-container">
            <div class="message-content" id="message-content"></div>
            <div class="alert info" style="margin-top: 20px;">تم حفظ اختيارك ولا يمكن تغييره</div>
        </div>
        
        <div class="alert info" id="selection-alert" style="display: none;">
            لقد قمت باختيار هدية مسبقاً ولا يمكن تغييرها
        </div>
    </div>

    <script>
        // الرسائل الخاصة بك
        const messages = [
            "تحولي 50 جنيه 🎁",
            "تحولي 50 جنيه 🎁", 
            "تحولي 50 جنيه 🎁",
            "تحولي 50 جنيه 🎁"
        ];

        // إنشاء الثلج في الخلفية
        function createSnowflakes() {
            for (let i = 0; i < 50; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                
                const size = Math.random() * 5 + 3;
                const posX = Math.random() * 100;
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 10;
                
                snowflake.style.width = `${size}px`;
                snowflake.style.height = `${size}px`;
                snowflake.style.left = `${posX}%`;
                snowflake.style.top = '-20px';
                snowflake.style.opacity = Math.random() * 0.5 + 0.3;
                
                // حركة الثلج
                const keyframes = `
                    @keyframes fall${i} {
                        0% {
                            transform: translateY(0) rotate(0deg);
                            opacity: ${snowflake.style.opacity};
                        }
                        100% {
                            transform: translateY(100vh) rotate(360deg);
                            opacity: 0;
                        }
                    }
                `;
                
                const style = document.createElement('style');
                style.textContent = keyframes;
                document.head.appendChild(style);
                
                snowflake.style.animation = `fall${i} ${duration}s linear ${delay}s infinite`;
                document.body.appendChild(snowflake);
            }
        }

        // تحميل البيانات المحفوظة
        window.onload = function() {
            createSnowflakes();
            
            const savedName = localStorage.getItem('username');
            const savedGift = localStorage.getItem('gift');
            
            if (savedName && savedGift) {
                showGiftPage(savedName);
                showGift(savedGift);
                disableAllBoxes();
            } else if (savedName) {
                document.getElementById('username').value = savedName;
            }
        };

        function start() {
            const nameInput = document.getElementById('username');
            const name = nameInput.value.trim();
            const errorAlert = document.getElementById('error-alert');
            
            if (!name) {
                errorAlert.style.display = 'block';
                setTimeout(() => errorAlert.style.display = 'none', 3000);
                return;
            }
            
            localStorage.setItem('username', name);
            showGiftPage(name);
            
            const savedGift = localStorage.getItem('gift');
            if (savedGift) {
                showGift(savedGift);
                disableAllBoxes();
            }
        }

        function showGiftPage(name) {
            document.getElementById('username-container').style.display = 'none';
            document.getElementById('gift-container').style.display = 'block';
            document.getElementById('welcome-name').textContent = name;
        }

        function selectGift(boxNum) {
            const savedGift = localStorage.getItem('gift');
            if (savedGift) {
                document.getElementById('selection-alert').style.display = 'block';
                setTimeout(() => document.getElementById('selection-alert').style.display = 'none', 3000);
                return;
            }
            
            localStorage.setItem('gift', boxNum);
            showGift(boxNum);
            disableAllBoxes();
            sendToTelegram(boxNum);
        }

        function showGift(boxNum) {
            const boxIndex = parseInt(boxNum) - 1;
            const messageContent = document.getElementById('message-content');
            const messageContainer = document.getElementById('message-container');
            
            messageContent.textContent = messages[boxIndex];
            messageContainer.style.display = 'block';
            
            const allBoxes = document.querySelectorAll('.gift-box');
            allBoxes.forEach(box => box.classList.remove('selected'));
            
            if (allBoxes[boxIndex]) {
                allBoxes[boxIndex].classList.add('selected');
            }
        }

        function disableAllBoxes() {
            const allBoxes = document.querySelectorAll('.gift-box');
            allBoxes.forEach(box => {
                box.classList.add('disabled');
                box.onclick = null;
            });
        }

        async function sendToTelegram(boxNum) {
            const userName = localStorage.getItem('username');
            const amount = messages[boxNum - 1];
            const note = `اختار هدية رقم ${boxNum}`;
            
            // عنوان السيرفر - ستحتاج لتغييره لسيرفرك الخاص
            const serverUrl = 'https://merry-christmas-wine-seven.vercel.app/send-to-telegram';
            
            const data = {
                username: userName,
                gift: amount,
                boxNumber: boxNum,
                timestamp: new Date().toISOString(),
                ip: await getClientIP()
            };
            
            try {
                // محاولة الإرسال للسيرفر
                const response = await fetch(serverUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    console.log('تم إرسال البيانات إلى التليجرام بنجاح');
                } else {
                    console.log('تم حفظ البيانات محلياً');
                    saveLocally(data);
                }
            } catch (error) {
                console.log('حفظ البيانات محلياً بسبب خطأ في الاتصال');
                saveLocally(data);
            }
        }

        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير معروف';
            }
        }

        function saveLocally(data) {
            // حفظ البيانات في localStorage للرجوع إليها لاحقاً
            const savedData = JSON.parse(localStorage.getItem('telegramData') || '[]');
            savedData.push(data);
            localStorage.setItem('telegramData', JSON.stringify(savedData));
            
            // يمكنك استرجاع هذه البيانات يدوياً
            console.log('البيانات المحفوظة محلياً:', savedData);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eidety | عيديتي</title>
    <link rel="icon" href="https://i.postimg.cc/Nj83FS93/Eidety.jpg" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0a0f1a 0%, #0f172a 100%);
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة متطورة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 40% 90%, rgba(236, 72, 153, 0.08) 0%, transparent 55%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* كرات متوهجة متحركة */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: rgba(139, 92, 246, 0.25);
            top: -150px;
            left: -150px;
            animation: floatSlow 22s ease-in-out infinite;
        }

        .orb-2 {
            width: 450px;
            height: 450px;
            background: rgba(59, 130, 246, 0.2);
            bottom: -200px;
            right: -200px;
            animation: floatSlow 28s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 280px;
            height: 280px;
            background: rgba(236, 72, 153, 0.15);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseGlow 18s ease-in-out infinite;
        }

        .orb-4 {
            width: 200px;
            height: 200px;
            background: rgba(245, 158, 11, 0.15);
            top: 20%;
            right: 10%;
            animation: floatSlow 19s ease-in-out infinite 1s;
        }

        @keyframes floatSlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(40px, -40px) rotate(120deg); }
            66% { transform: translate(-30px, 30px) rotate(240deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.25; }
        }

        /* الحاوية الرئيسية - زجاجية فاخرة */
        .container {
            max-width: 950px;
            width: 100%;
            padding: 40px 35px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(24px);
            border-radius: 56px;
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            text-align: center;
            position: relative;
            z-index: 2;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,240,0.05);
        }

        .container:hover {
            box-shadow: 0 35px 70px -18px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fcd34d, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            position: relative;
            padding-bottom: 20px;
            letter-spacing: -0.5px;
            font-weight: 800;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 3px;
            background: linear-gradient(to right, transparent, #fbbf24, #f59e0b, #fbbf24, transparent);
            border-radius: 3px;
        }

        h2 {
            font-size: 2rem;
            margin: 20px 0 10px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        h3 {
            font-size: 1.4rem;
            color: #cbd5e6;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(96,165,250,0.2);
        }

        /* شعار أنيق */
        .logo {
            width: 110px;
            height: 110px;
            margin: 15px auto;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(251, 191, 36, 0.4);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        .logo:hover {
            transform: scale(1.06) rotate(2deg);
            border-color: rgba(251, 191, 36, 0.9);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.5);
        }

        /* مجموعة الإدخال */
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin: 40px 0 25px;
        }

        input {
            width: 100%;
            max-width: 420px;
            padding: 18px 28px;
            font-size: 1.15rem;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(96, 165, 250, 0.25);
            border-radius: 80px;
            color: #f1f5f9;
            text-align: center;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 5px rgba(251, 191, 36, 0.2);
            background: rgba(30, 41, 59, 0.95);
            transform: scale(1.02);
        }

        input::placeholder {
            color: #64748b;
            font-weight: 400;
        }

        /* زر رئيسي أنيق */
        .btn {
            padding: 18px 55px;
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #d97706, #fbbf24);
            color: #0f172a;
            border: none;
            border-radius: 80px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 12px 28px rgba(245, 158, 11, 0.35);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:hover::before {
            width: 380px;
            height: 380px;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 35px rgba(245, 158, 11, 0.5);
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        .btn:active {
            transform: translateY(2px);
        }

        /* الصناديق - هدايا */
        .boxes-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin: 50px 0 40px;
        }

        .gift-box {
            width: 150px;
            height: 150px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 4.2rem;
            transition: all 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 
                0 18px 32px -8px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        .gift-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #fbbf24, #f59e0b, #fbbf24, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gift-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #60a5fa, #3b82f6, #60a5fa, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gift-box:hover {
            transform: translateY(-14px) scale(1.06);
            box-shadow: 
                0 28px 45px -12px rgba(0, 0, 0, 0.7),
                0 0 0 4px rgba(245, 158, 11, 0.25);
            background: linear-gradient(145deg, #2d3a5e, #1a253c);
        }

        .gift-box:hover::before,
        .gift-box:hover::after {
            opacity: 1;
        }

        .gift-box.selected {
            transform: scale(1.08);
            background: linear-gradient(145deg, #1e3a8a, #1e40af);
            box-shadow: 
                0 0 35px rgba(59, 130, 246, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.5);
        }

        .gift-box.selected::before,
        .gift-box.selected::after {
            opacity: 1;
        }

        .gift-box.disabled {
            cursor: not-allowed;
            opacity: 0.55;
            filter: grayscale(0.2);
            transform: scale(0.97);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
        }

        .gift-box.disabled:hover {
            transform: scale(0.97);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
        }

        /* ترحيب المستخدم */
        .user-welcome {
            font-size: 1.5rem;
            color: #e2e8f0;
            margin: 20px 0 30px;
            padding: 15px 32px;
            border-radius: 80px;
            background: rgba(30, 41, 59, 0.6);
            display: inline-block;
            border: 1px solid rgba(251, 191, 36, 0.3);
            backdrop-filter: blur(12px);
            font-weight: 600;
        }

        .user-welcome span {
            color: #fbbf24;
            font-weight: 800;
            text-shadow: 0 0 6px rgba(251,191,36,0.4);
        }

        /* رسالة الهدية */
        .message-container {
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.12), rgba(16, 185, 129, 0.06));
            border-radius: 38px;
            border: 2px solid rgba(74, 222, 128, 0.25);
            display: none;
            backdrop-filter: blur(8px);
        }

        .message-container.show {
            display: block;
            animation: fadeInUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .message-content {
            font-size: 2.3rem;
            font-weight: 800;
            color: #4ade80;
            text-shadow: 0 0 18px rgba(74, 222, 128, 0.4);
            padding: 20px;
            border-radius: 28px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.3);
            word-break: break-word;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* التنبيهات */
        .alert {
            padding: 14px 24px;
            border-radius: 80px;
            margin: 20px auto;
            font-weight: 600;
            display: none;
            animation: fadeInUp 0.45s ease;
            max-width: 90%;
            backdrop-filter: blur(12px);
        }

        .alert.show {
            display: inline-block;
        }

        .alert.error {
            background: rgba(220, 38, 38, 0.2);
            color: #fecaca;
            border: 1px solid rgba(220, 38, 38, 0.45);
        }

        .alert.info {
            background: rgba(59, 130, 246, 0.15);
            color: #bfdbfe;
            border: 1px solid rgba(59, 130, 246, 0.35);
        }

        /* ثلج متحرك */
        .snowflake {
            position: fixed;
            background: radial-gradient(circle, #ffffff, #e2e8f0);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.5;
            z-index: 1;
            filter: blur(1px);
            box-shadow: 0 0 3px rgba(255,255,200,0.5);
        }

        /* استجابة كاملة */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .container { padding: 28px 20px; border-radius: 42px; }
            h1 { font-size: 2.3rem; }
            h2 { font-size: 1.6rem; }
            h3 { font-size: 1.2rem; }
            .logo { width: 85px; height: 85px; }
            .gift-box { width: 105px; height: 105px; font-size: 3.2rem; border-radius: 28px; }
            .boxes-container { gap: 18px; }
            .message-content { font-size: 1.7rem; padding: 15px; }
            .user-welcome { font-size: 1.2rem; padding: 12px 24px; }
            .btn { padding: 15px 40px; font-size: 1.1rem; }
            input { padding: 14px 22px; font-size: 1rem; }
        }

        @media (max-width: 480px) {
            .gift-box { width: 80px; height: 80px; font-size: 2.5rem; border-radius: 22px; }
            .boxes-container { gap: 12px; }
            h1 { font-size: 1.8rem; }
            .container { padding: 20px 15px; }
            .message-content { font-size: 1.3rem; }
        }

        /* تحسين التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
    </style>
</head>
<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
    <div class="glow-orb orb-4"></div>

    <!-- شاشة إدخال الاسم -->
    <div class="container" id="username-container">
        <h1>✨ Eidety | عيديتي ✨</h1>
        <h2>اختر هديتك العيدية</h2>

        <img class="logo" src="https://i.postimg.cc/Nj83FS93/Eidety.jpg" alt="Eidety Logo">

        <h2>خريستوس انيستي</h2>
        <h3>Χριστός ἀνέστη — المسيح قام!</h3>

        <div class="input-group">
            <input type="text" id="username" placeholder="✍️ اكتب اسمك هنا..." />
            <button class="btn" onclick="startExperience()">🎁 ادخل إلى المفاجأة 🎁</button>
        </div>

        <div class="alert error" id="error-alert">❄️ من فضلك اكتب اسمك أولاً لتظهر الهدايا</div>
    </div>

    <!-- شاشة الهدايا -->
    <div class="container" id="gift-container" style="display: none;">
        <h1>🎀 اختر صندوق هديتك 🎀</h1>
        
        <div class="user-welcome" id="user-welcome">🌟 مرحباً، <span id="welcome-name"></span> 🌟</div>
        
        <div class="boxes-container">
            <div class="gift-box" data-box="1" onclick="selectGift(1)">🎁</div>
            <div class="gift-box" data-box="2" onclick="selectGift(2)">🎁</div>
            <div class="gift-box" data-box="3" onclick="selectGift(3)">🎁</div>
            <div class="gift-box" data-box="4" onclick="selectGift(4)">🎁</div>
        </div>
        
        <div class="message-container" id="message-container">
            <div class="message-content" id="message-content"></div>
            <div class="alert info" style="margin-top: 20px; display: inline-block;">💎 تم حفظ اختيارك بنجاح ولا يمكن تغييره 💎</div>
        </div>
        
        <div class="alert info" id="selection-alert" style="display: none;">
            ⚠️ لقد قمت بالفعل باختيار هديتك المميزة مسبقاً، شكراً لك!
        </div>
    </div>

    <script>
        // قائمة الهدايا المميزة
        const giftsMessages = [
            "تحولي 50 جنيه",
            "تحولي 100 جنيه",
             "احولك 50 جنيه",
            "تحولي 100 جنيه"
        ];

        // إنشاء الثلج المتساقط الديناميكي
        function createSnowfall() {
            const snowCount = 80;
            for (let i = 0; i < snowCount; i++) {
                const snow = document.createElement('div');
                snow.classList.add('snowflake');
                const size = Math.random() * 6 + 2;
                const posX = Math.random() * 100;
                const duration = Math.random() * 12 + 8;
                const delay = Math.random() * 15;
                const opacityVal = Math.random() * 0.5 + 0.25;
                
                snow.style.width = `${size}px`;
                snow.style.height = `${size}px`;
                snow.style.left = `${posX}%`;
                snow.style.top = '-20px';
                snow.style.opacity = opacityVal;
                
                const animName = `fallSnow${i}`;
                const keyframesStyle = `
                    @keyframes ${animName} {
                        0% { transform: translateY(0) rotate(0deg); opacity: ${opacityVal}; }
                        100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
                    }
                `;
                const styleSheet = document.createElement('style');
                styleSheet.textContent = keyframesStyle;
                document.head.appendChild(styleSheet);
                snow.style.animation = `${animName} ${duration}s linear ${delay}s infinite`;
                document.body.appendChild(snow);
            }
        }

        // الحصول على عنوان IP (محاولة)
        async function fetchClientIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (err) {
                return 'غير متاح';
            }
        }

        // حفظ البيانات محلياً وإرسالها إلى سيرفر وهمي / حقيقي (نموذج تسجيل)
        async function recordGiftToTelegram(boxNumber, userName, giftText) {
            const ipAddress = await fetchClientIP();
            const payload = {
                username: userName,
                gift: giftText,
                boxNumber: boxNumber,
                timestamp: new Date().toISOString(),
                ip: ipAddress,
                userAgent: navigator.userAgent.substring(0, 100)
            };
            
            // محاولة الإرسال إلى endpoint تجريبي (يمكن استبداله بالسيرفر الحقيقي)
            // نستخدم endpoint وهمي ولكن مع catch لحفظ البيانات محلياً كنسخة احتياطية
            try {
                // يمكنك تغيير الرابط إلى رابط السيرفر الخاص بك
                const response = await fetch('https://eidety.vercel.app/send-to-telegram', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) console.log("✅ تم إرسال الهدية للتليجرام");
                else console.log("⚠️ سيتم التخزين المحلي");
            } catch (error) {
                console.log("📦 اتصال مؤقت، تخزين البيانات محلياً");
            }
            // تخزين نسخة في localStorage للإحتفاظ بسجل
            const history = JSON.parse(localStorage.getItem('eidety_gifts_history') || '[]');
            history.push(payload);
            localStorage.setItem('eidety_gifts_history', JSON.stringify(history));
        }

        // بدء التجربة
        function startExperience() {
            const nameField = document.getElementById('username');
            const userName = nameField.value.trim();
            const errorDiv = document.getElementById('error-alert');
            
            if (!userName) {
                errorDiv.classList.add('show');
                setTimeout(() => errorDiv.classList.remove('show'), 2800);
                return;
            }
            
            localStorage.setItem('eidety_username', userName);
            showGiftSelection(userName);
            
            const savedGiftIndex = localStorage.getItem('eidety_selected_gift');
            if (savedGiftIndex !== null) {
                displayGiftResult(parseInt(savedGiftIndex));
                disableGiftBoxes();
            }
        }
        
        function showGiftSelection(name) {
            document.getElementById('username-container').style.display = 'none';
            const giftContainer = document.getElementById('gift-container');
            giftContainer.style.display = 'block';
            document.getElementById('welcome-name').innerText = name;
        }
        
        // اختيار الهدية
        async function selectGift(boxNumber) {
            const existingGift = localStorage.getItem('eidety_selected_gift');
            if (existingGift) {
                const alertBox = document.getElementById('selection-alert');
                alertBox.classList.add('show');
                setTimeout(() => alertBox.classList.remove('show'), 3000);
                return;
            }
            
            const userName = localStorage.getItem('eidety_username') || 'مستخدم';
            const giftMessage = giftsMessages[boxNumber - 1] || `🎁 هدية خاصة رقم ${boxNumber}`;
            
            localStorage.setItem('eidety_selected_gift', boxNumber);
            displayGiftResult(boxNumber);
            disableGiftBoxes();
            
            // إرسال البيانات للتسجيل (تلغرام / سيرفر)
            await recordGiftToTelegram(boxNumber, userName, giftMessage);
            
            // إظهار إشعار نجاح إضافي
            const successToast = document.createElement('div');
            successToast.className = 'alert info';
            successToast.innerText = '🎉 تم حفظ هديتك بنجاح! 🎉';
            successToast.style.position = 'fixed';
            successToast.style.bottom = '20px';
            successToast.style.left = '50%';
            successToast.style.transform = 'translateX(-50%)';
            successToast.style.zIndex = '999';
            successToast.style.background = 'rgba(34,197,94,0.25)';
            successToast.style.border = '1px solid #4ade80';
            successToast.style.backdropFilter = 'blur(20px)';
            document.body.appendChild(successToast);
            setTimeout(() => successToast.remove(), 2800);
        }
        
        function displayGiftResult(boxNumber) {
            const msgContainer = document.getElementById('message-container');
            const msgContent = document.getElementById('message-content');
            const giftText = giftsMessages[boxNumber - 1];
            msgContent.innerHTML = `🎁 ${giftText} 🎁`;
            msgContainer.classList.add('show');
            
            // تمييز الصندوق المختار
            const allBoxes = document.querySelectorAll('.gift-box');
            allBoxes.forEach((box, idx) => {
                if (idx + 1 === boxNumber) {
                    box.classList.add('selected');
                } else {
                    box.classList.remove('selected');
                }
            });
        }
        
        function disableGiftBoxes() {
            const boxes = document.querySelectorAll('.gift-box');
            boxes.forEach(box => {
                box.classList.add('disabled');
                box.onclick = null;  // تعطيل النقر
            });
        }
        
        // استرجاع البيانات عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            createSnowfall();
            
            const storedName = localStorage.getItem('eidety_username');
            const storedGift = localStorage.getItem('eidety_selected_gift');
            
            if (storedName && storedGift) {
                document.getElementById('username').value = storedName;
                showGiftSelection(storedName);
                displayGiftResult(parseInt(storedGift));
                disableGiftBoxes();
            } else if (storedName) {
                document.getElementById('username').value = storedName;
            }
        });
    </script>
</body>
</html>

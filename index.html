<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eidety | عيديتي</title>
    <link rel="icon" href="https://i.postimg.cc/Nj83FS93/Eidety.jpg" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0a0f1a 0%, #0f172a 100%);
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 40% 90%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* حلقات متحركة */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.2);
            top: -150px;
            left: -150px;
            animation: float 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.15);
            bottom: -200px;
            right: -200px;
            animation: float 25s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(236, 72, 153, 0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.2; }
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 35px 30px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            position: relative;
            padding-bottom: 20px;
            letter-spacing: -0.5px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 30%;
            right: 30%;
            height: 3px;
            background: linear-gradient(to right, transparent, #fbbf24, #f59e0b, #fbbf24, transparent);
            border-radius: 3px;
        }

        h2 {
            font-size: 1.8rem;
            margin: 20px 0 10px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        h3 {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 15px auto;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            border-color: rgba(251, 191, 36, 0.8);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 35px 0 20px;
        }

        input {
            width: 100%;
            max-width: 400px;
            padding: 16px 24px;
            font-size: 1.1rem;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(96, 165, 250, 0.2);
            border-radius: 60px;
            color: #f1f5f9;
            text-align: center;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
            background: rgba(30, 41, 59, 0.95);
        }

        input::placeholder {
            color: #64748b;
        }

        .btn {
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.25);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.4);
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        .btn:active {
            transform: translateY(0);
        }

        .boxes-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin: 45px 0;
        }

        .gift-box {
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 4rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gift-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f59e0b, #fbbf24, #f59e0b, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gift-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #60a5fa, #3b82f6, #60a5fa, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gift-box:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 
                0 20px 35px -8px rgba(0, 0, 0, 0.6),
                0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        .gift-box:hover::before,
        .gift-box:hover::after {
            opacity: 1;
        }

        .gift-box.selected {
            transform: scale(1.05);
            background: linear-gradient(145deg, #1e3a8a, #1e40af);
            box-shadow: 
                0 0 30px rgba(59, 130, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(96, 165, 250, 0.3);
        }

        .gift-box.selected::before,
        .gift-box.selected::after {
            opacity: 1;
        }

        .gift-box.disabled {
            cursor: not-allowed;
            opacity: 0.5;
            filter: grayscale(0.3);
            transform: scale(0.98);
        }

        .gift-box.disabled:hover {
            transform: scale(0.98);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .user-welcome {
            font-size: 1.4rem;
            color: #cbd5e1;
            margin: 20px 0 25px;
            padding: 15px 25px;
            border-radius: 60px;
            background: rgba(30, 41, 59, 0.6);
            display: inline-block;
            border: 1px solid rgba(96, 165, 250, 0.2);
            backdrop-filter: blur(10px);
        }

        .user-welcome span {
            color: #fbbf24;
            font-weight: 700;
        }

        .message-container {
            margin-top: 35px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(16, 185, 129, 0.05));
            border-radius: 28px;
            border: 2px solid rgba(34, 197, 94, 0.2);
            display: none;
        }

        .message-container.show {
            display: block;
            animation: fadeInUp 0.6s ease;
        }

        .message-content {
            font-size: 2.2rem;
            font-weight: 800;
            color: #4ade80;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
            padding: 20px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert {
            padding: 14px 20px;
            border-radius: 60px;
            margin: 20px 0;
            font-weight: 600;
            display: none;
            animation: fadeInUp 0.4s ease;
        }

        .alert.show {
            display: block;
        }

        .alert.error {
            background: rgba(220, 38, 38, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.3);
            backdrop-filter: blur(10px);
        }

        .alert.info {
            background: rgba(59, 130, 246, 0.12);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.25);
            backdrop-filter: blur(10px);
        }

        /* ثلج متحرك */
        .snowflake {
            position: fixed;
            background: linear-gradient(135deg, #fff, #e2e8f0);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            z-index: 1;
            filter: blur(1px);
        }

        /* استجابة للأجهزة المختلفة */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .container {
                padding: 25px 20px;
                border-radius: 35px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            h2 {
                font-size: 1.4rem;
            }
            
            h3 {
                font-size: 1.1rem;
            }
            
            .logo {
                width: 80px;
                height: 80px;
            }
            
            .gift-box {
                width: 100px;
                height: 100px;
                font-size: 3rem;
                border-radius: 22px;
            }
            
            .boxes-container {
                gap: 15px;
            }
            
            .message-content {
                font-size: 1.6rem;
                padding: 15px;
            }
            
            .user-welcome {
                font-size: 1.1rem;
                padding: 10px 20px;
            }
            
            .btn {
                padding: 14px 35px;
                font-size: 1.1rem;
            }
            
            input {
                padding: 14px 20px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .gift-box {
                width: 75px;
                height: 75px;
                font-size: 2.2rem;
                border-radius: 18px;
            }
            
            .boxes-container {
                gap: 12px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .container {
                padding: 20px 15px;
            }
            
            .message-content {
                font-size: 1.3rem;
            }
        }

        @media (min-width: 1200px) {
            .container {
                max-width: 1000px;
            }
            
            .gift-box {
                width: 160px;
                height: 160px;
                font-size: 4.5rem;
            }
        }

        /* تحسين التمرير */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }
    </style>

#lock-container {
    display: none;
}
    </style>
</head>
<body>
    <div class="container" id="lock-container">
    <h1>خريستوس انيستي</h1>
    <h3>Χριστός ἀνέστη</h3>

    <img class="logo" src="https://i.postimg.cc/Nj83FS93/Eidety.jpg" alt="logo">

    <h2>الموقع مقفول حالياً ❤️</h2>
    <p style="margin-top:10px;color:#cbd5e1;font-size:1.1rem;">
        سيتم فتح الموقع يوم 12/04/2026 الساعة 12:00
    </p>

    <div id="countdown" style="margin-top:25px;font-size:1.6rem;font-weight:700;color:#fbbf24;"></div>
    </div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <div class="container" id="username-container">
        <h1>Eidety | عيديتي</h1>
        <h2>اختر هديتك</h2>

        <img class="logo" src="https://i.postimg.cc/Nj83FS93/Eidety.jpg" alt="Eidety Logo">

        <h2>خريستوس انيستي</h2>
        <h3>Χριστός ἀνέστη</h3>

        <div class="input-group">
            <input type="text" id="username" placeholder="اكتب اسمك هنا" />
            <button class="btn" onclick="start()">دخول إلى المفاجأة</button>
        </div>

        <div class="alert error" id="error-alert">من فضلك اكتب اسمك أولاً</div>
    </div>

    <div class="container" id="gift-container" style="display: none;">
        <h1>اختر هديتك</h1>
        
        <div class="user-welcome" id="user-welcome">مرحباً، <span id="welcome-name"></span></div>
        
        <div class="boxes-container">
            <div class="gift-box" onclick="selectGift(1)">🎁</div>
            <div class="gift-box" onclick="selectGift(2)">🎁</div>
            <div class="gift-box" onclick="selectGift(3)">🎁</div>
            <div class="gift-box" onclick="selectGift(4)">🎁</div>
        </div>
        
        <div class="message-container" id="message-container">
            <div class="message-content" id="message-content"></div>
            <div class="alert info" style="margin-top: 20px;">تم حفظ اختيارك ولا يمكن تغييره</div>
        </div>
        
        <div class="alert info" id="selection-alert" style="display: none;">
            لقد قمت باختيار هدية مسبقاً ولا يمكن تغييرها
        </div>
    </div>

    <script>
        // الرسائل الخاصة بك
        const messages = [
            "تحولي 50 جنيه 🎁",
            "احولك 100 جنيه 🎁", 
            "تحولي 50 جنيه 🎁",
            "احولك 100 جنيه 🎁"
        ];

const unlockDate = new Date("2026-04-10T11:25:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const distance = unlockDate - now;

    if (distance <= 0) {
        document.getElementById("lock-container").style.display = "none";
        document.getElementById("username-container").style.display = "block";
        clearInterval(timer);
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        `${days} يوم - ${hours} ساعة - ${minutes} دقيقة - ${seconds} ثانية`;
}

function checkLock() {
    const now = new Date().getTime();

    if (now < unlockDate) {
        document.getElementById("lock-container").style.display = "block";
        document.getElementById("username-container").style.display = "none";
        document.getElementById("gift-container").style.display = "none";
    } else {
        document.getElementById("lock-container").style.display = "none";
    }
}

checkLock();
const timer = setInterval(updateCountdown, 1000);
updateCountdown();
        
        // إنشاء الثلج في الخلفية
        function createSnowflakes() {
            for (let i = 0; i < 50; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                
                const size = Math.random() * 5 + 3;
                const posX = Math.random() * 100;
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 10;
                
                snowflake.style.width = `${size}px`;
                snowflake.style.height = `${size}px`;
                snowflake.style.left = `${posX}%`;
                snowflake.style.top = '-20px';
                snowflake.style.opacity = Math.random() * 0.5 + 0.3;
                
                // حركة الثلج
                const keyframes = `
                    @keyframes fall${i} {
                        0% {
                            transform: translateY(0) rotate(0deg);
                            opacity: ${snowflake.style.opacity};
                        }
                        100% {
                            transform: translateY(100vh) rotate(360deg);
                            opacity: 0;
                        }
                    }
                `;
                
                const style = document.createElement('style');
                style.textContent = keyframes;
                document.head.appendChild(style);
                
                snowflake.style.animation = `fall${i} ${duration}s linear ${delay}s infinite`;
                document.body.appendChild(snowflake);
            }
        }

        // تحميل البيانات المحفوظة
        window.onload = function() {
            createSnowflakes();
            
            const savedName = localStorage.getItem('username');
            const savedGift = localStorage.getItem('gift');
            
            if (savedName && savedGift) {
                showGiftPage(savedName);
                showGift(savedGift);
                disableAllBoxes();
            } else if (savedName) {
                document.getElementById('username').value = savedName;
            }
        };

        function start() {
            const nameInput = document.getElementById('username');
            const name = nameInput.value.trim();
            const errorAlert = document.getElementById('error-alert');
            
            if (!name) {
                errorAlert.style.display = 'block';
                setTimeout(() => errorAlert.style.display = 'none', 3000);
                return;
            }
            
            localStorage.setItem('username', name);
            showGiftPage(name);
            
            const savedGift = localStorage.getItem('gift');
            if (savedGift) {
                showGift(savedGift);
                disableAllBoxes();
            }
        }

        function showGiftPage(name) {
            document.getElementById('username-container').style.display = 'none';
            document.getElementById('gift-container').style.display = 'block';
            document.getElementById('welcome-name').textContent = name;
        }

        function selectGift(boxNum) {
            const savedGift = localStorage.getItem('gift');
            if (savedGift) {
                document.getElementById('selection-alert').style.display = 'block';
                setTimeout(() => document.getElementById('selection-alert').style.display = 'none', 3000);
                return;
            }
            
            localStorage.setItem('gift', boxNum);
            showGift(boxNum);
            disableAllBoxes();
            sendToTelegram(boxNum);
        }

        function showGift(boxNum) {
            const boxIndex = parseInt(boxNum) - 1;
            const messageContent = document.getElementById('message-content');
            const messageContainer = document.getElementById('message-container');
            
            messageContent.textContent = messages[boxIndex];
            messageContainer.style.display = 'block';
            
            const allBoxes = document.querySelectorAll('.gift-box');
            allBoxes.forEach(box => box.classList.remove('selected'));
            
            if (allBoxes[boxIndex]) {
                allBoxes[boxIndex].classList.add('selected');
            }
        }

        function disableAllBoxes() {
            const allBoxes = document.querySelectorAll('.gift-box');
            allBoxes.forEach(box => {
                box.classList.add('disabled');
                box.onclick = null;
            });
        }

        async function sendToTelegram(boxNum) {
            const userName = localStorage.getItem('username');
            const amount = messages[boxNum - 1];
            const note = `اختار هدية رقم ${boxNum}`;
            
            // عنوان السيرفر - ستحتاج لتغييره لسيرفرك الخاص
            const serverUrl = 'https://eidety.vercel.app/send-to-telegram';
            
            const data = {
                username: userName,
                gift: amount,
                boxNumber: boxNum,
                timestamp: new Date().toISOString(),
                ip: await getClientIP()
            };
            
            try {
                // محاولة الإرسال للسيرفر
                const response = await fetch(serverUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    console.log('تم إرسال البيانات إلى التليجرام بنجاح');
                } else {
                    console.log('تم حفظ البيانات محلياً');
                    saveLocally(data);
                }
            } catch (error) {
                console.log('حفظ البيانات محلياً بسبب خطأ في الاتصال');
                saveLocally(data);
            }
        }

        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير معروف';
            }
        }

        function saveLocally(data) {
            // حفظ البيانات في localStorage للرجوع إليها لاحقاً
            const savedData = JSON.parse(localStorage.getItem('telegramData') || '[]');
            savedData.push(data);
            localStorage.setItem('telegramData', JSON.stringify(savedData));
            
            // يمكنك استرجاع هذه البيانات يدوياً
            console.log('البيانات المحفوظة محلياً:', savedData);
        }
    </script>

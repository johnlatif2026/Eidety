<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <style>
    body{font-family:Arial, "Noto Sans Arabic", sans-serif;padding:20px;background:#f7f9ff}
    .wrap{max-width:900px;margin:0 auto}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}
    th,td{padding:10px;border-bottom:1px solid #eee;text-align:right}
    th{background:#f0f6ff}
    .btn{padding:8px 12px;border-radius:6px;border:none;background:#0b6efd;color:#fff;cursor:pointer}
    .muted{color:#666}
    p.error{color:red;}
  </style>
</head>
<body dir="rtl">
  <div class="wrap">
    <h2>لوحة تحكم التحويلات</h2>
    <button class="btn" id="logoutBtn" style="margin-bottom:12px;">تسجيل الخروج</button>
    <div id="content" class="muted">جارٍ التحميل...</div>
  </div>

<script>
const content = document.getElementById('content');
const logoutBtn = document.getElementById('logoutBtn');
const token = localStorage.getItem('jwt');

// إذا لم يكن هناك توكن، أعِد التوجيه مباشرة
if (!token) {
  window.location.href = '/login';
}

// تسجيل الخروج
logoutBtn.addEventListener('click', () => {
  localStorage.removeItem('jwt');
  window.location.href = '/login';
});

// دالة الهروب من HTML لمنع XSS
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}

// تحميل البيانات من السيرفر
async function loadData() {
  content.textContent = 'جارٍ التحميل...';

  try {
    const res = await fetch('/dashboard/data', {
      method: 'GET',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      }
    });

    if (res.status === 401 || res.status === 403) {
      content.innerHTML = '<p class="error">غير مسموح بالدخول. سيتم إعادة التوجيه إلى صفحة الدخول...</p>';
      setTimeout(() => window.location.href = '/login', 2000);
      return;
    }

    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      content.innerHTML = '<div>لا توجد تحويلات بعد.</div>';
      return;
    }

    let html = '<table><thead><tr><th>#</th><th>اسم المستخدم</th><th>الهدية</th><th>رقم الصندوق</th><th>الوقت</th></tr></thead><tbody>';
    data.forEach((t, i) => {
      html += `<tr>
        <td>${i+1}</td>
        <td>${escapeHtml(t.username)}</td>
        <td>${escapeHtml(t.gift)}</td>
        <td>${escapeHtml(t.boxNumber)}</td>
        <td>${new Date(t.savedAt).toLocaleString('ar-EG')}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    content.innerHTML = html;

  } catch (err) {
    content.textContent = 'فشل الاتصال بالخادم';
  }
}

loadData();
</script>
</body>
</html>

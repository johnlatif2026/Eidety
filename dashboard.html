<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}
.container {
    max-width:800px;
    margin:auto;
}
.card {
    background:#1e293b;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}
button {
    padding:10px;
    border:none;
    background:red;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <h1>Dashboard</h1>
    <button onclick="logout()">Logout</button>

    <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');

// حماية الصفحة
if (!token) {
    window.location.href = '/login';
}

// تحميل البيانات
async function loadData() {
    const res = await fetch('/dashboard/data', {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });

    if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('token');
        window.location.href = '/login';
        return;
    }

    const data = await res.json();

    document.getElementById('data').innerHTML =
        data.map(item => `
            <div class="card">
                <div>👤 ${item.username || 'unknown'}</div>
                <div>🎁 ${item.gift || ''}</div>
                <div>🕒 ${item.savedAt || ''}</div>
            </div>
        `).join('');
}

function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login';
}

loadData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Eidety | عديتي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Tajawal', sans-serif;
        background: linear-gradient(135deg, #0b0f1c 0%, #1a1f2e 100%);
        min-height: 100vh;
        color: #f0f3fa;
        position: relative;
    }

    /* خلفية متحركة */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 50%, rgba(79, 70, 229, 0.15) 0%, rgba(0,0,0,0) 50%);
        pointer-events: none;
        z-index: 0;
    }

    /* الهيدر - زجاجي */
    header {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .logo-icon {
        font-size: 28px;
        background: linear-gradient(45deg, #a855f7, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    header h3 {
        font-weight: 800;
        font-size: 1.5rem;
        background: linear-gradient(to left, #c084fc, #60a5fa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: -0.5px;
    }

    .btn-logout {
        background: linear-gradient(95deg, #dc2626, #b91c1c);
        border: none;
        padding: 10px 22px;
        color: white;
        border-radius: 40px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.25s ease;
        box-shadow: 0 4px 12px rgba(220,38,38,0.3);
    }

    .btn-logout:hover {
        transform: translateY(-2px);
        filter: brightness(1.05);
        box-shadow: 0 8px 18px rgba(220,38,38,0.4);
    }

    /* الحاوية الرئيسية */
    .container {
        max-width: 1100px;
        margin: 30px auto;
        padding: 0 20px 40px;
        position: relative;
        z-index: 2;
    }

    /* بطاقات أنيقة */
    .card {
        background: rgba(30, 35, 55, 0.6);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 28px;
        padding: 1.2rem 1.8rem;
        margin-bottom: 18px;
        transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card:hover {
        transform: translateY(-5px) scale(1.01);
        background: rgba(45, 52, 80, 0.8);
        border-color: rgba(139, 92, 246, 0.5);
        box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4);
    }

    .info-section {
        flex: 1;
    }

    .username {
        font-size: 1.3rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
    }

    .username i {
        color: #facc15;
        font-size: 1.3rem;
    }

    .gift-text {
        font-size: 1rem;
        color: #cbd5e6;
        margin: 8px 0 6px;
        word-break: break-word;
        background: rgba(0,0,0,0.25);
        padding: 6px 12px;
        border-radius: 50px;
        display: inline-block;
    }

    .badge-time {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 14px;
        border-radius: 40px;
        font-size: 0.75rem;
        color: #a5b4fc;
        font-weight: 500;
        margin-top: 8px;
    }

    /* زر الحذف - أنيق وناعم */
    .delete-btn {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.4);
        color: #f87171;
        padding: 10px 18px;
        border-radius: 40px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        backdrop-filter: blur(4px);
    }

    .delete-btn:hover {
        background: #ef4444;
        color: white;
        border-color: #ef4444;
        transform: scale(1.02);
        box-shadow: 0 4px 12px rgba(239,68,68,0.4);
    }

    /* رسالة فارغة */
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: rgba(255,255,255,0.02);
        border-radius: 48px;
        border: 1px dashed rgba(255,255,255,0.2);
    }

    .empty-state i {
        font-size: 60px;
        color: #4b5563;
        margin-bottom: 15px;
    }

    /* مؤقت تحميل */
    .loading {
        text-align: center;
        padding: 50px;
        font-size: 1.2rem;
        color: #94a3b8;
    }

    /* استجابة */
    @media (max-width: 640px) {
        .card {
            flex-direction: column;
            align-items: stretch;
        }
        .delete-btn {
            justify-content: center;
        }
        header {
            padding: 0.8rem 1rem;
        }
        .logo-icon {
            font-size: 22px;
        }
    }
</style>
</head>
<body>

<header>
    <div class="logo-area">
        <i class="fas fa-chart-line logo-icon"></i>
        <h3>Dashboard Eidety | عديتي</h3>
    </div>
    <button class="btn-logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Exit
    </button>
</header>

<div class="container" id="data">
    <div class="loading">
        <i class="fas fa-spinner fa-pulse"></i> Loading...
    </div>
</div>

<script>
const token = localStorage.getItem('token');

if (!token) {
    window.location.href = '/login';
}

async function fetchData() {
    try {
        const res = await fetch('/dashboard/data', {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        if (res.status === 401 || res.status === 403) {
            localStorage.removeItem('token');
            window.location.href = '/login';
            return;
        }

        let data = await res.json();

        const container = document.getElementById('data');

        if (!data.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <h3>لا توجد بيانات</h3>
                </div>
            `;
            return;
        }

        container.innerHTML = data.map(item => `
            <div class="card">
                <div class="info-section">
                    <div class="username">
                        <b>${escapeHtml(item.username || 'مجهول')}</b>
                    </div>

                    <div class="gift-text">
                        ${escapeHtml(item.gift || '')}
                    </div>

                    <div class="badge-time">
                        ${new Date(item.savedAt).toLocaleString('ar-EG')}
                    </div>
                </div>

                <button class="delete-btn" onclick="deleteItem('${item.id}')">
                    حذف
                </button>
            </div>
        `).join('');

    } catch (err) {
        console.error(err);
    }
}

// DELETE
window.deleteItem = async function(id) {
    if (!confirm('متأكد؟')) return;

    const res = await fetch(`/dashboard/data/${id}`, {
        method: 'DELETE',
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });

    if (res.ok) {
        fetchData();
        showToast('تم الحذف');
    } else {
        alert(await res.text());
    }
};

function escapeHtml(str) {
    return str ? str.replace(/[&<>]/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;'
    }[m])) : '';
}

function showToast(msg) {
    const t = document.createElement('div');
    t.innerText = msg;
    t.style = `
        position:fixed;
        bottom:20px;
        left:50%;
        transform:translateX(-50%);
        background:#10b981;
        color:#fff;
        padding:10px 20px;
        border-radius:30px;
    `;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login';
}

fetchData();
setInterval(fetchData, 3000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <style>
    body{font-family:Arial, "Noto Sans Arabic", sans-serif;padding:20px;background:#f7f9ff}
    .wrap{max-width:900px;margin:0 auto}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}
    th,td{padding:10px;border-bottom:1px solid #eee;text-align:right}
    th{background:#f0f6ff}
    input{padding:8px;border-radius:6px;border:1px solid #ddd}
    .btn{padding:8px 12px;border-radius:6px;border:none;background:#0b6efd;color:#fff;cursor:pointer}
    .muted{color:#666}
    p.error{color:red;}
  </style>
</head>
<body dir="rtl">
  <div class="wrap">
    <h2>لوحة تحكم التحويلات</h2>
    <button class="btn" id="logoutBtn" style="margin-bottom:12px;">تسجيل الخروج</button>
    <div id="content" class="muted">جارٍ التحميل...</div>
  </div>

<script>
  const token = localStorage.getItem('jwt');
  const content = document.getElementById('content');
  const logoutBtn = document.getElementById('logoutBtn');

  if (!token) {
    content.innerHTML = '<p class="error">لم يتم تسجيل الدخول. يرجى العودة إلى <a href="/login">صفحة الدخول</a>.</p>';
  }

  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('jwt');
    window.location.href = '/login';
  });

  async function loadData() {
    if (!token) return;

    content.textContent = 'جارٍ التحميل...';
    try {
      const res = await fetch('/dashboard/data', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (res.status === 401 || res.status === 403) {
        content.innerHTML = '<p class="error">لا تملك صلاحية الدخول. يرجى تسجيل الدخول مجددًا.</p>';
        return;
      }

      const data = await res.json();
      if (!Array.isArray(data) || data.length === 0) {
        content.innerHTML = '<div>لا توجد تحويلات بعد.</div>';
        return;
      }

      let html = '<table><thead><tr><th>#</th><th>اسم المستخدم</th><th>الهدية</th><th>رقم الصندوق</th><th>الوقت</th></tr></thead><tbody>';
      data.forEach((t, i) => {
        html += `<tr>
          <td>${i+1}</td>
          <td>${escapeHtml(t.username)}</td>
          <td>${escapeHtml(t.gift)}</td>
          <td>${escapeHtml(t.boxNumber)}</td>
          <td>${new Date(t.savedAt).toLocaleString('ar-EG')}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      content.innerHTML = html;

    } catch (err) {
      content.textContent = 'فشل الاتصال بالخادم';
    }
  }

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; });
  }

  loadData();
</script>
</body>
</html>

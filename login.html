<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <style>
    body { font-family: Arial, "Noto Sans Arabic", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f7f9ff; }
    .login-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; }
    button { padding: 10px; width: 100%; border: none; border-radius: 6px; background: #0b6efd; color: #fff; cursor: pointer; }
    p { color: red; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>تسجيل الدخول</h2>
    <input id="username" placeholder="اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة المرور">
    <button id="loginBtn">دخول</button>
    <p id="msg"></p>
  </div>

<script>
const loginBtn = document.getElementById('loginBtn');
const msg = document.getElementById('msg');

loginBtn.addEventListener('click', async () => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!username || !password) {
    msg.textContent = 'ادخل اسم المستخدم وكلمة المرور';
    return;
  }

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await resp.json();
    if (data.success && data.token) {
      localStorage.getItem('jwt', data.token);
      window.location.href = '/dashboard';
    } else {
      msg.textContent = data.message || 'خطأ في الدخول';
    }
  } catch (err) {
    msg.textContent = 'فشل الاتصال بالخادم';
  }
});
</script>
</body>
</html>
